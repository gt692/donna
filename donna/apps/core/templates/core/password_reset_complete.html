{% extends "core/base_auth.html" %}
{% load i18n %}

{% block title %}Passwort geändert{% endblock %}

{% block card_content %}
  <div class="flex flex-col items-center text-center mb-6">
    <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center mb-4">
      <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h2 class="text-lg font-semibold text-slate-800">Passwort erfolgreich geändert</h2>
    <p class="text-slate-500 text-sm mt-2 max-w-xs">
      Dein Passwort wurde gespeichert. Du kannst dich jetzt mit deinem neuen Passwort anmelden.
    </p>
  </div>

  <a href="{% url 'core:login' %}"
     class="w-full flex items-center justify-center bg-[#1666b0] hover:bg-[#1255a0] active:bg-[#0d4f8c]
            text-white font-semibold py-3 px-4 rounded-lg transition text-sm">
    Zur Anmeldung
  </a>
{% endblock %}
