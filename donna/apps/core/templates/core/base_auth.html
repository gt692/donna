{% load static %}
<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Donna{% endblock %} — Donna Business OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rufina:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            donna: { DEFAULT: "#1666b0", dark: "#1255a0", light: "#e0e7ff" }
          },
          fontFamily: {
            donna: ['"Rufina"', 'Georgia', 'serif']
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo / Brand -->
    <div class="flex items-center justify-center gap-4 mb-8">
      <img src="{% static 'images/logo.png' %}"
           alt="Donna"
           class="w-16 h-16 rounded-full object-cover object-top border-2 border-slate-600 shadow-lg flex-shrink-0">
      <div>
        <h1 class="font-donna text-3xl text-white tracking-wide">Donna</h1>
        <p class="text-slate-400 text-sm mt-0.5">Business Operating System</p>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <!-- Messages -->
      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
            {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% elif message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200
            {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      {% block card_content %}{% endblock %}
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      &copy; {% now "Y" %} Donna Business OS — Intern & Vertraulich
    </p>
  </div>

</body>
</html>
