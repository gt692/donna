{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vielen Dank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Inter"', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } } }
  </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">
  <div class="text-center max-w-sm">
    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="text-xl font-semibold text-slate-800 mb-2">Vielen Dank!</h1>
    <p class="text-slate-500 text-sm">Ihre Angaben wurden erfolgreich übermittelt. Wir werden uns in Kürze bei Ihnen melden.</p>
  </div>
</body>
</html>
