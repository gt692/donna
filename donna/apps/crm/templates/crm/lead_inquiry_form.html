<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ihre Kontaktdaten — {{ project.name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-start justify-center py-12 px-4">
  <div class="w-full max-w-lg">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-2xl font-bold text-[#1666b0] mb-1">Donna</div>
      <p class="text-slate-500 text-sm">Kontaktdaten-Anfrage</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 md:p-8">
      <h1 class="text-lg font-semibold text-slate-800 mb-1">Guten Tag,</h1>
      <p class="text-sm text-slate-500 mb-6">
        Um Ihre Anfrage <strong>„{{ project.name }}"</strong> optimal bearbeiten zu können, bitten wir Sie, Ihre Kontaktdaten und eine kurze Beschreibung Ihres Anliegens zu ergänzen.
      </p>

      <form method="post" novalidate class="space-y-4">
        {% csrf_token %}

        <!-- Kundentyp-Auswahl -->
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-2">Ich bin</label>
          <div class="grid grid-cols-2 gap-2">
            <label class="flex items-center gap-2 px-4 py-3 rounded-lg border-2 cursor-pointer transition
                          border-[#1666b0] bg-blue-50 customer-type-label" data-type="private">
              <input type="radio" name="customer_type" value="private" checked class="sr-only">
              <svg class="w-5 h-5 text-[#1666b0]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <span class="text-sm font-medium text-[#1666b0]">Privatperson</span>
            </label>
            <label class="flex items-center gap-2 px-4 py-3 rounded-lg border-2 cursor-pointer transition
                          border-slate-200 bg-white customer-type-label" data-type="company">
              <input type="radio" name="customer_type" value="company" class="sr-only">
              <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
              </svg>
              <span class="text-sm font-medium text-slate-500">Unternehmen</span>
            </label>
          </div>
        </div>

        <!-- Firmenname (nur bei Unternehmen) -->
        <div id="field-company" class="hidden">
          <label class="block text-xs font-medium text-slate-500 mb-1">Firmenname</label>
          <input type="text" name="company_name" value="{{ inquiry.company_name }}"
                 class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">Vorname</label>
            <input type="text" name="first_name" value="{{ inquiry.first_name }}"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">Nachname</label>
            <input type="text" name="last_name" value="{{ inquiry.last_name }}"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">E-Mail</label>
            <input type="email" name="email" value="{{ inquiry.email }}"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">Telefon</label>
            <input type="tel" name="phone" value="{{ inquiry.phone }}"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
          </div>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Straße + Nr.</label>
          <input type="text" name="street" value="{{ inquiry.street }}"
                 class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">PLZ</label>
            <input type="text" name="postal_code" value="{{ inquiry.postal_code }}"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-500 mb-1">Stadt</label>
            <input type="text" name="city" value="{{ inquiry.city }}"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
          </div>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Rechnungs-E-Mail <span class="text-slate-400 font-normal">(falls abweichend von Kontakt-E-Mail)</span></label>
          <input type="email" name="invoice_email" value="{{ inquiry.invoice_email }}"
                 placeholder="rechnung@beispiel.de"
                 class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]">
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Beschreibung Ihres Anliegens</label>
          <textarea name="request_description" rows="4"
                    class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#1666b0]"
                    placeholder="Bitte beschreiben Sie kurz, womit wir Ihnen helfen können...">{{ inquiry.request_description }}</textarea>
        </div>

        <button type="submit"
                class="w-full bg-[#1666b0] hover:bg-[#1255a0] text-white text-sm font-semibold py-3 rounded-lg transition mt-2">
          Absenden
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">Ihre Daten werden vertraulich behandelt.</p>
  </div>

  <script>
    (function () {
      const labels = document.querySelectorAll('.customer-type-label');
      const companyField = document.getElementById('field-company');

      function updateUI(selectedType) {
        labels.forEach(function (label) {
          const type = label.dataset.type;
          const span = label.querySelector('span');
          const svg = label.querySelector('svg');
          if (type === selectedType) {
            label.classList.add('border-[#1666b0]', 'bg-blue-50');
            label.classList.remove('border-slate-200', 'bg-white');
            if (span) { span.classList.add('text-[#1666b0]'); span.classList.remove('text-slate-500'); }
            if (svg) { svg.classList.add('text-[#1666b0]'); svg.classList.remove('text-slate-400'); }
          } else {
            label.classList.remove('border-[#1666b0]', 'bg-blue-50');
            label.classList.add('border-slate-200', 'bg-white');
            if (span) { span.classList.remove('text-[#1666b0]'); span.classList.add('text-slate-500'); }
            if (svg) { svg.classList.remove('text-[#1666b0]'); svg.classList.add('text-slate-400'); }
          }
        });
        if (companyField) {
          companyField.classList.toggle('hidden', selectedType !== 'company');
        }
      }

      labels.forEach(function (label) {
        label.addEventListener('click', function () {
          const radio = label.querySelector('input[type="radio"]');
          if (radio) {
            radio.checked = true;
            updateUI(label.dataset.type);
          }
        });
      });

      // Init
      const checked = document.querySelector('input[name="customer_type"]:checked');
      if (checked) updateUI(checked.value);
    })();
  </script>
</body>
</html>
