services:
  db:
    image: pgvector/pgvector:pg16
    container_name: donna-postgres
    environment:
      POSTGRES_DB: donna
      POSTGRES_USER: donna
      POSTGRES_PASSWORD: donna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
